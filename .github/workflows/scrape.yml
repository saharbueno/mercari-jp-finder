name: Mercari Scraper

on:
  schedule:
    # Runs every 5 minutes (UTC). GitHub may delay scheduled runs by several minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: mercari-scraper
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log run time
        run: echo "Scrape started at $(date -u)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore listings database
        uses: actions/cache/restore@v4
        with:
          path: data/listings.db
          key: mercari-listings-db-v1
          restore-keys: |
            mercari-listings-db-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python run_scrape.py

      - name: Save listings database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/listings.db
          key: mercari-listings-db-v1
